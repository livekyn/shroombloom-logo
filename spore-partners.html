<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spore Partners - ShroomBloom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #0a0a0a;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #ffffff;
      line-height: 1.6;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 2rem 1.5rem;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 100%);
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
      margin-top: 1rem;
    }

    .header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #E91E8C, #AAFF00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: #999999;
      font-size: 1rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #AAFF00;
      text-decoration: none;
      margin-bottom: 2rem;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .back-link:hover {
      color: #E91E8C;
      gap: 0.75rem;
    }

    .content {
      max-width: 700px;
      margin: 0 auto;
      width: 100%;
    }

    .partners-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .partner-card {
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.03);
      border: 2.5px solid #E91E8C;
      border-radius: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      animation: slideUp 0.6s ease both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .partner-card:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: #AAFF00;
      box-shadow: 0 0 20px rgba(170, 255, 0, 0.4);
      transform: translateY(-4px);
    }

    .partner-info {
      flex: 1;
    }

    .partner-name {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    .partner-description {
      font-size: 0.9rem;
      color: #999999;
    }

    .partner-link {
      padding: 0.75rem 1.5rem;
      background: #E91E8C;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      text-decoration: none;
      transition: all 0.3s ease;
      font-weight: 500;
      white-space: nowrap;
    }

    .partner-link:hover {
      background: #AAFF00;
      color: #0a0a0a;
    }

    .footer {
      margin-top: 3rem;
      text-align: center;
      color: #666666;
      font-size: 0.85rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(233, 30, 140, 0.2);
    }

    @media (max-width: 600px) {
      .partner-card {
        flex-direction: column;
        text-align: center;
      }

      .header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">
      ← Back to Home
    </a>

    <div class="header">
      <h1>Spore Partners</h1>
      <p>Trusted vendors we recommend</p>
    </div>

    <div class="content">
      <div class="partners-list">
        <div class="partner-card">
          <div class="partner-info">
            <div class="partner-name">Inoculate The World</div>
            <div class="partner-description">Code: <span style="color: #AAFF00; font-weight: 500;">Nublume20</span></div>
          </div>
          <a href="https://inoculatetheworld.com/product-category/isolated-syringes/" class="partner-link" target="_blank">Click Here</a>
        </div>

        <div class="partner-card">
          <div class="partner-info">
            <div class="partner-name">SporesMD</div>
            <div class="partner-description">Code: <span style="color: #AAFF00; font-weight: 500;">Nublume20</span></div>
          </div>
          <a href="https://sporesmd.com/shop/microscopy-liquid-cultures/" class="partner-link" target="_blank">Click Here</a>
        </div>

        <div class="partner-card">
          <div class="partner-info">
            <div class="partner-name">Thick Spores</div>
            <div class="partner-description">Code: <span style="color: #AAFF00; font-weight: 500;">Bloom15</span></div>
          </div>
          <a href="https://thickspores.com/" class="partner-link" target="_blank">Click Here</a>
        </div>
      </div>
    </div>

    <div class="footer">
      Have a vendor recommendation? Reach out to us on Discord
    </div>
  </div>
</body>
</html>
